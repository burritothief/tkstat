name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Verify tag matches Cargo.toml
        shell: bash
        run: |
          package_version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -n 1)"
          test "${GITHUB_REF_NAME}" = "v${package_version}"
      - run: cargo test --all-features --locked

  build:
    name: Build ${{ matrix.name }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            archive: tar.gz
            binary: tkstat
          - name: macos-arm64
            os: macos-14
            archive: tar.gz
            binary: tkstat
          - name: windows-x86_64
            os: windows-latest
            archive: zip
            binary: tkstat.exe
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --locked

      - name: Package archive (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          archive="tkstat-${GITHUB_REF_NAME}-${{ matrix.name }}.${{ matrix.archive }}"
          tar -C target/release -czf "dist/${archive}" "${{ matrix.binary }}"

      - name: Package archive (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $archive = "tkstat-$env:GITHUB_REF_NAME-${{ matrix.name }}.${{ matrix.archive }}"
          Compress-Archive -Path "target/release/${{ matrix.binary }}" -DestinationPath "dist/$archive"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/*

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Generate SHA-256 checksums
        shell: bash
        run: find dist -type f -print0 | sort -z | xargs -0 sha256sum > dist/SHA256SUMS

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/**/*
            dist/SHA256SUMS
